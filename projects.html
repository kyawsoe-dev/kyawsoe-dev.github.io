<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kyaw Soe | Projects</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:300,400,700">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.0/css/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.6.1/css/pikaday.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Google ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1284575678233580"
        crossorigin="anonymous"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TPET8D6TSW"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-TPET8D6TSW');
    </script>

    <!-- Google AMP -->
    <script async custom-element="amp-auto-ads" src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js"></script>

<body class="dark-mode">
    <amp-auto-ads type="adsense" data-ad-client="ca-pub-1284575678233580"></amp-auto-ads>

    <!-- Navbar placeholder -->
    <div id="navbar"></div>

    <main class="page projets-page">
        <section class="portfolio-block mt-4">
            <div class="container">
                <div class="heading text-center mb-5">
                    <h2>Featured Projects</h2>
                    <p class="text-muted">A showcase of web applications and systems I've built using modern technologies.</p>
                </div>

                <div id="projects-container" class="row"></div>
            </div>
        </section>
    </main>

    <!-- Footer placeholder -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="components/js/script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.6.1/pikaday.min.js"></script>
    <script src="assets/js/script.min.js"></script>
    <script>
      fetch('projects.json')
        .then(res => res.json())
        .then(projects => {
          const container = document.getElementById('projects-container');
          projects.forEach(p => {
            const tagsHtml = p.tags.map(t =>
              `<span class="badge bg-secondary text-white me-1">${t}</span>`
            ).join(' ');
            const card = document.createElement('div');
            card.className = 'col-md-6 col-lg-4';
            card.innerHTML = `
              <div class="project-card-no-image">
                <h3 class="h5 mb-2">${p.title}</h3>
                <p class="text-muted${p.tags.length > 4 ? ' mb-3' : ''}">${p.description}</p>
                <div class="mb-3">${tagsHtml}</div>
                <div>
                  <a href="${p.github}" target="_blank" class="btn btn-outline-secondary btn-sm me-2">
                    <i class="ion-social-github me-1"></i> Github
                  </a>
                  <a href="${p.live}" target="_blank" class="btn btn-outline-primary btn-sm">
                    <i class="ion-android-open me-1"></i> Live
                  </a>
                  ${p.mobile ? `<a href="${p.mobile}" target="_blank" class="btn btn-outline-success btn-sm">
                    <i class="ion-android-phone-portrait me-1"></i> Mobile
                  </a>` : ''}
                </div>
              </div>
            `;
            container.appendChild(card);
          });
        })
        .catch(err => console.error('Error loading projects:', err));
    </script>
</body>

</html>
